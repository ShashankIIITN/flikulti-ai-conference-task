<!DOCTYPE html>
<html lang="en">
<!--
  Flik AI Training Planner — Embeddable Widget
  Embed on any site with:
    <iframe src="https://YOUR-SERVER/widget" width="100%" height="700"
            style="border:none;border-radius:12px"></iframe>
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flik AI Training Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .w-header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .w-header .logo { font-size: 1rem; font-weight: 700; }
    .w-header .logo span { color: #e63946; }
    .w-header a {
      font-size: 0.72rem; color: #aaa; text-decoration: none;
    }
    .w-header a:hover { color: #fff; }

    /* Phase tabs */
    .phases {
      display: flex;
      border-bottom: 2px solid #eee;
      flex-shrink: 0;
    }
    .phase-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 600;
      color: #aaa;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      letter-spacing: 0.04em;
      transition: color 0.2s;
      cursor: default;
    }
    .phase-tab.active { color: #1a1a2e; border-bottom-color: #e63946; }
    .phase-tab.done   { color: #4caf50; }

    /* Shared scroll area */
    .scroll { flex: 1; overflow-y: auto; padding: 16px 18px; }

    /* Chat messages */
    .messages { display: flex; flex-direction: column; gap: 10px; }
    .msg {
      max-width: 92%; padding: 9px 13px; border-radius: 14px;
      line-height: 1.5; font-size: 0.88rem;
    }
    .msg.assistant { background: #f0f2f7; border-bottom-left-radius: 4px; align-self: flex-start; }
    .msg.user      { background: #1a1a2e; color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }
    .msg.system    {
      background: #fff3cd; border: 1px solid #ffc107; color: #856404;
      align-self: center; font-size: 0.78rem; border-radius: 8px;
      text-align: center; max-width: 100%;
    }

    /* Input footer */
    .foot {
      padding: 10px 14px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      background: #fff;
    }
    .foot input {
      flex: 1; padding: 8px 12px; border: 1.5px solid #dde1ea;
      border-radius: 8px; font-size: 0.88rem; outline: none;
    }
    .foot input:focus { border-color: #1a1a2e; }
    .foot input:disabled { background: #f8f8f8; }
    .foot button {
      padding: 8px 14px; background: #1a1a2e; color: #fff;
      border: none; border-radius: 8px; font-size: 0.88rem; cursor: pointer;
    }
    .foot button:hover { background: #e63946; }
    .foot button:disabled { background: #ccc; cursor: default; }

    /* Plan area */
    #plan-area { display: none; }
    #plan-area .plan-actions {
      display: flex; gap: 7px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .btn-sm {
      padding: 6px 12px; border: 1.5px solid #dde1ea; border-radius: 7px;
      background: #fff; font-size: 0.76rem; cursor: pointer; color: #555;
      transition: border-color 0.15s;
    }
    .btn-sm:hover:not(:disabled) { border-color: #1a1a2e; color: #1a1a2e; }
    .btn-sm:disabled { opacity: 0.35; cursor: default; }

    /* Rendered markdown */
    #plan-out h1 { font-size: 1.3rem; margin-bottom: 6px; }
    #plan-out h2 { font-size: 1.05rem; margin: 22px 0 8px; padding-bottom: 5px; border-bottom: 2px solid #e63946; }
    #plan-out h3 { font-size: 0.93rem; margin: 14px 0 4px; }
    #plan-out p  { margin-bottom: 8px; color: #333; line-height: 1.65; font-size: 0.88rem; }
    #plan-out ul, #plan-out ol { margin: 5px 0 9px 18px; color: #333; font-size: 0.88rem; }
    #plan-out li { margin-bottom: 3px; }
    #plan-out a  { color: #e63946; text-decoration: none; }
    #plan-out a:hover { text-decoration: underline; }
    #plan-out strong { color: #1a1a2e; }
    #plan-out blockquote {
      border-left: 3px solid #e63946; padding: 6px 12px;
      margin: 8px 0; background: #fafafa; color: #555; border-radius: 0 5px 5px 0;
      font-size: 0.86rem;
    }
    #plan-out hr { border: none; border-top: 1px solid #eee; margin: 16px 0; }

    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid #ddd; border-top-color: #e63946;
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #w-status {
      padding: 5px 18px; font-size: 0.72rem; color: #aaa;
      background: #f8f9fb; border-top: 1px solid #eee; flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="w-header">
  <div class="logo">Flik <span>AI</span> Planner</div>
  <a href="https://www.flikulti.com" target="_blank">flikulti.com ↗</a>
</div>

<div class="phases">
  <div class="phase-tab active" id="tab-1">1 · Your session</div>
  <div class="phase-tab"        id="tab-2">2 · Build plan</div>
  <div class="phase-tab"        id="tab-3">3 · Your plan</div>
</div>

<!-- Phase 1 & 2 share the scroll+foot (chat) -->
<div class="scroll" id="chat-scroll">
  <div class="messages" id="messages"></div>
</div>
<div class="foot" id="chat-foot">
  <input type="text" id="user-input" placeholder="Type your answer…" autocomplete="off" />
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<!-- Phase 3: plan -->
<div class="scroll" id="plan-area">
  <div class="plan-actions">
    <button class="btn-sm" id="regen-btn" onclick="regeneratePlan()">↺ Regenerate</button>
    <button class="btn-sm" id="copy-btn"  onclick="copyPlan()">Copy</button>
    <button class="btn-sm" id="dl-btn"    onclick="downloadPlan()">Download .md</button>
    <button class="btn-sm" onclick="restartWidget()">New plan</button>
  </div>
  <div id="plan-out"></div>
</div>

<div id="w-status">Ready</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let convHistory = [];
let sessionCtx  = null;
let planMd      = "";
let generating  = false;

window.addEventListener("DOMContentLoaded", () => {
  const opening = "What do you want to work on in your next session?";
  addMsg("assistant", opening);
  convHistory.push({ role: "assistant", content: opening });
  document.getElementById("user-input").focus();
  document.getElementById("user-input")
    .addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
});

function addMsg(role, text) {
  const wrap = document.getElementById("messages");
  const d = document.createElement("div");
  d.className = `msg ${role}`;
  d.textContent = text;
  wrap.appendChild(d);
  wrap.scrollTop = wrap.scrollHeight;
  document.getElementById("chat-scroll").scrollTop =
    document.getElementById("chat-scroll").scrollHeight;
}

function setTab(n) {
  [1,2,3].forEach(i => {
    const t = document.getElementById(`tab-${i}`);
    t.classList.toggle("active", i === n);
    if (i < n) t.classList.add("done");
  });
}

function setStatus(t) { document.getElementById("w-status").textContent = t; }

async function sendMessage() {
  const inp  = document.getElementById("user-input");
  const text = inp.value.trim();
  if (!text || generating) return;
  inp.value = "";
  addMsg("user", text);
  convHistory.push({ role: "user", content: text });

  inp.disabled = true;
  document.getElementById("send-btn").disabled = true;
  setStatus("Thinking…");

  try {
    const res  = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: convHistory }),
    });
    const data = await res.json();

    if (data.context) {
      sessionCtx = data.context;
      addMsg("system",
        `Building plan for: "${sessionCtx.topic}" · ${sessionCtx.level} · ${sessionCtx.duration || "90 min"}`
      );
      setTab(2);
      await startGenerate(sessionCtx);
    } else {
      addMsg("assistant", data.reply);
      convHistory.push({ role: "assistant", content: data.reply });
      inp.disabled = false;
      document.getElementById("send-btn").disabled = false;
      inp.focus();
      setStatus("Ready");
    }
  } catch (e) {
    addMsg("system", "Server error — is the planner running?");
    inp.disabled = false;
    document.getElementById("send-btn").disabled = false;
    setStatus("Error");
  }
}

async function startGenerate(ctx) {
  generating = true;
  planMd     = "";
  setStatus("⏳ Searching Flikulti…");

  // Hide chat, show plan area
  document.getElementById("chat-scroll").style.display = "none";
  document.getElementById("chat-foot").style.display   = "none";
  const planArea = document.getElementById("plan-area");
  planArea.style.display = "flex";
  planArea.style.flexDirection = "column";

  const out = document.getElementById("plan-out");
  out.innerHTML = `<p><span class="spinner"></span> Retrieving drills, theory, and analysis…</p>`;
  ["regen-btn","copy-btn","dl-btn"].forEach(id =>
    document.getElementById(id).disabled = true
  );

  const res = await fetch("/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(ctx),
  });

  if (!res.ok) {
    out.innerHTML = "<p>Generation failed.</p>";
    setStatus("Error"); generating = false; return;
  }

  out.innerHTML = "";
  setStatus("✍️ Writing plan…");
  setTab(3);

  const reader = res.body.getReader();
  const dec    = new TextDecoder();
  let buf = "";

  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split("\n"); buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith("data: ")) continue;
      const payload = line.slice(6);
      if (payload === "[DONE]") break;
      try {
        planMd += JSON.parse(payload);
        out.innerHTML = marked.parse(planMd);
        document.getElementById("plan-area").scrollTop =
          document.getElementById("plan-area").scrollHeight;
      } catch (_) {}
    }
  }

  out.innerHTML = marked.parse(planMd);
  setStatus("✅ Plan ready");
  generating = false;
  ["regen-btn","copy-btn","dl-btn"].forEach(id =>
    document.getElementById(id).disabled = false
  );
}

function regeneratePlan() {
  if (!sessionCtx || generating) return;
  startGenerate(sessionCtx);
}

function copyPlan() {
  navigator.clipboard.writeText(planMd).then(() => {
    const b = document.getElementById("copy-btn");
    b.textContent = "Copied!";
    setTimeout(() => b.textContent = "Copy", 1500);
  });
}

function downloadPlan() {
  const slug = (sessionCtx?.topic || "plan")
    .toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
  const a = Object.assign(document.createElement("a"), {
    href:     URL.createObjectURL(new Blob([planMd],{type:"text/markdown"})),
    download: `plan-${slug}.md`,
  });
  a.click();
}

function restartWidget() {
  sessionCtx = null; planMd = ""; convHistory = [];
  document.getElementById("messages").innerHTML = "";
  document.getElementById("plan-out").innerHTML = "";
  document.getElementById("plan-area").style.display  = "none";
  document.getElementById("chat-scroll").style.display = "block";
  document.getElementById("chat-foot").style.display   = "flex";
  document.getElementById("user-input").disabled  = false;
  document.getElementById("send-btn").disabled    = false;
  [1,2,3].forEach(i => {
    document.getElementById(`tab-${i}`).classList.remove("active","done");
  });
  document.getElementById("tab-1").classList.add("active");
  setStatus("Ready");

  const opening = "What do you want to work on in your next session?";
  addMsg("assistant", opening);
  convHistory.push({ role: "assistant", content: opening });
  document.getElementById("user-input").focus();
}
</script>
</body>
</html>
